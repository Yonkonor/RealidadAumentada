<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AR Video desde QR</title>
    <!-- 1. Cargamos A-Frame y AR.js desde CDN -->
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        /* 2. Estilos CSS opcionales para centrar o poner un mensaje */
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        .info {
            position: absolute; top: 10px; left: 10px;
            color: white; background: rgba(0,0,0,0.6); padding: 5px 10px;
            border-radius: 5px; z-index: 10; pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="info">Apuntá al marcador Hiro 📷</div>

    <!-- 3. La escena A-Frame con AR embebido -->
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        
        <!-- 4. Definimos un marcador predefinido (el clásico "Hiro") -->
        <a-marker preset="hiro">
            <!-- 5. Dentro del marcador, ponemos el video -->
            <a-video 
                src="https://www.youtube.com/watch?v=I9rWj2blNKk"   <!-- ⚠️ Cambiá esta URL -->
                width="1" height="0.5625"   <!-- Tamaño en metros (16:9) -->
                position="0 0.5 0"          <!-- Lo levantamos un poco -->
                rotation="-90 0 0"          <!-- Lo acostamos para que mire a cámara -->
                autoplay loop muted         <!-- Se reproduce solo, en bucle y sin sonido (política de autoplay) -->
            ></a-video>
        </a-marker>

        <!-- 6. Cámara obligatoria, no la tocamos -->
        <a-entity camera></a-entity>
    </a-scene>
</body>
</html>
