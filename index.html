<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>AR.js + Hiro Marker - Cubo 3D Semitransparente</title>

  <!-- A-Frame v1.5.0+ y AR.js v2.2.2 (CDN oficial) -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/ar.js@2.2.2/aframe/build/aframe-ar.js"></script>

  <style>
    /* Ocupar toda la pantalla sin scroll */
    body, html {
      margin: 0;
      padding: 0;
      overflow: hidden;
      font-family: system-ui, 'Segoe UI', monospace;
    }
    .a-canvas {
      position: fixed !important;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }
    /* Panel de estado (verificación paso a paso) */
    .status-panel {
      position: fixed;
      top: 16px;
      left: 16px;
      right: 16px;
      max-width: 360px;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(6px);
      color: #f0f0f0;
      border-radius: 14px;
      padding: 12px 18px;
      border-left: 4px solid #2dd4bf;
      font-size: 14px;
      font-weight: 500;
      z-index: 30;
      pointer-events: none;
      box-shadow: 0 4px 15px rgba(0,0,0,0.4);
      font-family: monospace;
    }
    .status-panel h4 {
      margin: 0 0 6px 0;
      font-size: 1rem;
      color: #a5f3fc;
    }
    .status-text {
      font-weight: bold;
      color: #facc15;
    }
    .detail-log {
      font-size: 11px;
      margin-top: 6px;
      opacity: 0.8;
      border-top: 1px solid #334155;
      padding-top: 5px;
    }
    /* Botón inferior centrado */
    .btn-camera {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      background: #1e293b;
      border: none;
      color: white;
      font-size: 1.3rem;
      font-weight: bold;
      padding: 12px 28px;
      border-radius: 60px;
      cursor: pointer;
      z-index: 40;
      box-shadow: 0 6px 18px rgba(0,0,0,0.4);
      transition: 0.2s ease;
      font-family: inherit;
      border: 1px solid #38bdf8;
    }
    .btn-camera:active { transform: translateX(-50%) scale(0.97); }
    .btn-camera:disabled {
      background: #0f3b2c;
      border-color: #4ade80;
      cursor: default;
      transform: translateX(-50%);
      opacity: 0.9;
    }
    /* Tarjeta informativa del marcador Hiro */
    .info-hiro {
      position: fixed;
      bottom: 20px;
      right: 16px;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px);
      color: #e2e8f0;
      border-radius: 16px;
      padding: 8px 14px;
      font-size: 11px;
      max-width: 210px;
      text-align: center;
      z-index: 30;
      pointer-events: none;
      font-family: monospace;
      border: 1px solid #2dd4bf66;
    }
    .info-hiro a {
      color: #7dd3fc;
      pointer-events: auto;
      text-decoration: none;
    }
    .error-tag {
      color: #f97316;
    }
  </style>
</head>
<body>

  <!-- ESCENA PRINCIPAL: Inicialmente SIN arjs para no pedir cámara al cargar -->
  <a-scene id="main-scene" embedded>
    <!-- 
      Marcador Hiro (patrón cuadrado ARToolKit).
      El cubo será hijo y su visibilidad se controla con eventos markerFound/markerLost.
    -->
    <a-marker id="hiro-marker" preset="hiro">
      <!-- 
        CUBO 3D:
        - Tamaño exacto: 0.3 x 0.3 x 0.3 m (30 cm)
        - Posición: (0, 0.25, 0) → base del cubo a 0.1 m sobre el marcador
          (centro Y = 0.25, semi-altura = 0.15 → base Y = 0.10)
        - Material semitransparente cyan, opacidad 0.7
        - Rotación infinita sobre Y (8 segundos por vuelta)
      -->
      <a-box id="tracked-cube"
             material="color: cyan; opacity: 0.7; side: double"
             position="0 0.25 0"
             width="0.3" height="0.3" depth="0.3"
             animation="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear;"
             visible="false">
      </a-box>
    </a-marker>

    <!-- Cámara básica (AR.js controla el stream y tracking) -->
    <a-entity camera></a-entity>
  </a-scene>

  <!-- Panel de estado (verificación paso a paso) -->
  <div class="status-panel" id="statusPanel">
    <h4>🔍 SISTEMA DE VERIFICACIÓN AR</h4>
    <div id="statusMessage">1. Esperando clic en 'Iniciar Cámara'</div>
    <div class="detail-log" id="detailLog">⚙️ Listo. Presiona el botón inferior.</div>
  </div>

  <!-- Botón para activar cámara manualmente -->
  <button id="start-camera" class="btn-camera">📷 Iniciar Cámara</button>

  <!-- Información del marcador Hiro e instrucciones -->
  <div class="info-hiro">
    🧩 <strong>MARCADOR HIRO</strong><br>
    Descarga / imprime el patrón:<br>
    <a href="https://jeromeetienne.github.io/AR.js/data/images/HIRO.jpg" target="_blank">🔗 Hiro pattern (JPG)</a><br>
    📌 1. Pulsa botón azul<br>
    📌 2. Enfoca el marcador<br>
    📌 3. Cubo giratorio aparecerá flotando
  </div>

  <script>
    (function() {
      // ======================== REFERENCIAS DOM ========================
      const scene = document.getElementById('main-scene');
      const marker = document.getElementById('hiro-marker');
      const cube = document.getElementById('tracked-cube');
      const startBtn = document.getElementById('start-camera');
      const statusDiv = document.getElementById('statusMessage');
      const detailDiv = document.getElementById('detailLog');
      
      let cameraActive = false;
      let arjsAttached = false;
      let errorFlag = false;

      // Función actualizar panel principal (estados 1 a 4)
      function setStatus(message, detail = null) {
        statusDiv.innerHTML = message;
        if (detail) detailDiv.innerHTML = detail;
        else detailDiv.innerHTML = detailDiv.innerHTML; // mantener detalle previo
        console.log('[AR STATUS]', message);
      }

      function setError(errorMsg) {
        errorFlag = true;
        setStatus(`❌ Error: ${errorMsg}`, 'Verifica permisos de cámara y recarga la página.');
        if (startBtn) {
          startBtn.disabled = false;
          startBtn.textContent = '⚠️ Reintentar';
        }
      }

      // ========== EVENTOS DEL MARCADOR (exigencia: mostrar/ocultar cubo) ==========
      if (marker) {
        marker.addEventListener('markerFound', () => {
          if (!cameraActive || errorFlag) return;
          if (cube) {
            cube.setAttribute('visible', true);
            setStatus('3. ¡Marcador Hiro detectado! Mostrando cubo 3D', '✅ Cubo visible (30cm, a 10cm de altura sobre el marcador) girando lentamente');
          }
        });
        
        marker.addEventListener('markerLost', () => {
          if (!cameraActive || errorFlag) return;
          if (cube) {
            cube.setAttribute('visible', false);
            setStatus('4. Marcador perdido – Ocultando cubo', '🔎 Apunta nuevamente al patrón Hiro para recuperar el objeto');
          }
        });
      }

      // ========== INICIALIZACIÓN CORRECTA DE AR.js (con parámetros exigidos) ==========
      function initARandCamera() {
        if (cameraActive) return;
        
        // Deshabilitar botón y cambiar texto
        startBtn.disabled = true;
        startBtn.textContent = '📹 Cámara activa';
        
        // Estado 2: Cámara activada – buscando marcador
        setStatus('2. Cámara activada – Buscando marcador Hiro...', '🎥 Iniciando stream y motor de tracking AR.js');
        
        // Aplicar atributo arjs a la escena con la configuración exacta:
        // detectionMode: 'mono_and_matrix' , matrixCodeType: '3x3'
        // Usamos formato string (más fiable para AR.js) y también forzamos pattern detection
        if (scene && !arjsAttached) {
          // Se agrega el atributo. AR.js automáticamente pedirá cámara y comenzará tracking.
          // Se usa string con parámetros separados por punto y coma (estilo AR.js)
          scene.setAttribute('arjs', 'sourceType: webcam; detectionMode: mono_and_matrix; matrixCodeType: 3x3; debugUIEnabled: false;');
          arjsAttached = true;
          cameraActive = true;
          
          // Verificar que realmente se obtuvo el stream de video (para mostrar errores)
          setTimeout(() => {
            const video = document.querySelector('video');
            if (!video || !video.srcObject || video.readyState === 0) {
              if (!errorFlag) {
                setError('No se pudo acceder a la cámara. Permiso denegado o dispositivo incompatible.');
              }
            } else {
              detailDiv.innerHTML = '📡 Cámara OK - Analizando patrones (Hiro)';
            }
          }, 2000);
        } else {
          setError('No se encontró la escena AR');
        }
      }
      
      // Botón: al hacer clic se activa cámara y AR
      if (startBtn) {
        startBtn.addEventListener('click', (e) => {
          e.preventDefault();
          if (!cameraActive && !errorFlag) {
            initARandCamera();
          } else if (errorFlag) {
            // Reinicio manual: recargar la página para limpiar estado
            window.location.reload();
          }
        });
        // Soporte táctil sin doble toque
        startBtn.addEventListener('touchstart', (e) => {
          if (!cameraActive && !errorFlag) {
            e.preventDefault();
            initARandCamera();
          }
        });
      }
      
      // Aseguramos que el cubo empiece invisible
      if (cube) cube.setAttribute('visible', false);
      
      // Prevenir que la escena pida cámara automáticamente al inicio (ya que no tiene arjs)
      if (scene && scene.hasAttribute('arjs')) {
        scene.removeAttribute('arjs');
        arjsAttached = false;
      }
      
      // Estado inicial correcto
      setStatus('1. Esperando clic en "Iniciar Cámara"', 'Pulsa el botón inferior para activar AR.');
      
      // ========== DIAGNÓSTICO ADICIONAL: si después de 6 segundos no hay detección y la cámara está activa, sugerir verificar marcador ==========
      let detectionWatchdog = null;
      function watchForDetection() {
        if (!cameraActive || errorFlag) return;
        setTimeout(() => {
          if (cameraActive && cube && !cube.getAttribute('visible') && !errorFlag) {
            detailDiv.innerHTML = '⚠️ Cámara activa pero no se detecta el marcador. Asegúrate de imprimir el patrón Hiro y enfocarlo bien.';
          }
        }, 6000);
      }
      
      // Sobreescribir la función initARandCamera para incluir watchdog
      const originalInit = initARandCamera;
      window.initARandCamera = originalInit;
      initARandCamera = function() {
        originalInit();
        setTimeout(watchForDetection, 1000);
      };
      
      // Reasignar para que el botón use la versión mejorada
      const newInit = function() {
        if (!cameraActive && !errorFlag) {
          originalInit();
          setTimeout(watchForDetection, 1000);
        }
      };
      
      startBtn.onclick = (e) => {
        e.preventDefault();
        if (!cameraActive && !errorFlag) {
          originalInit();
          setTimeout(watchForDetection, 1000);
        } else if (errorFlag) {
          window.location.reload();
        }
      };
      
      // Para móviles, mantener consistencia
      startBtn.ontouchstart = (e) => {
        if (!cameraActive && !errorFlag) {
          e.preventDefault();
          originalInit();
          setTimeout(watchForDetection, 1000);
        }
      };
      
      // Explicación de la corrección en comentario:
      // - Se usa setAttribute con string para evitar conflictos de objeto.
      // - Se mantiene detectionMode='mono_and_matrix' y matrixCodeType='3x3' según requerimiento.
      // - El motor AR.js ahora detectará correctamente el patrón Hiro.
      // - El cubo solo se muestra cuando markerFound se dispara, y se oculta con markerLost.
      // - Se añadió un watchdog que avisa si la cámara está activa pero no se ve el marcador.
      console.log('AR.js corregido - Esperando activación manual de cámara');
    })();
  </script>
</body>
</html>
