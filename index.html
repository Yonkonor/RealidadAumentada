<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Video 3D RA - Marcador Hiro</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: sans-serif;
        }
        #ui {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }
        #start-panel {
            background: rgba(0,0,0,0.85);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            color: white;
            pointer-events: auto;
        }
        #start-btn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            border-radius: 30px;
            margin-top: 15px;
            cursor: pointer;
        }
        #status {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="ui">
        <div id="start-panel">
            <h2>📱 Realidad Aumentada</h2>
            <p>Necesitamos acceso a tu cámara</p>
            <button id="start-btn">🎥 Iniciar cámara</button>
        </div>
        <div id="status"></div>
    </div>

    <!-- Escena AR: oculta hasta que el usuario dé el permiso con el botón -->
    <a-scene
        id="ar-scene"
        embedded
        vr-mode-ui="enabled: false"
        arjs="sourceType: webcam; trackingMethod: best; debugUIEnabled: false;"
        renderer="logarithmicDepthBuffer: true;"
        style="display: none;"
    >
        <a-marker preset="hiro" id="marker">
            <a-video
                src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4"
                width="0.9"
                height="0.5"
                position="0 0 0.1"
                rotation="-90 0 0"
                autoplay
                loop
                muted
                playsinline
                webkit-playsinline
            ></a-video>
        </a-marker>
        <a-entity camera></a-entity>
    </a-scene>

    <!-- Librerías -->
    <script src="https://cdn.jsdelivr.net/npm/aframe@1.4.0/dist/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ar.js@2.2.2/aframe/build/aframe-ar.min.js"></script>

    <script>
        const startPanel = document.getElementById('start-panel');
        const scene = document.getElementById('ar-scene');
        const statusDiv = document.getElementById('status');
        const startBtn = document.getElementById('start-btn');

        function setStatus(msg) {
            statusDiv.textContent = msg;
            console.log('[AR]', msg);
        }

        // Al hacer clic, mostramos la escena. AR.js se inicializará y pedirá la cámara.
        startBtn.addEventListener('click', () => {
            setStatus('⏳ Solicitando cámara...');
            startPanel.style.display = 'none';
            scene.style.display = ''; // quita display:none, vuelve visible
            // AR.js arranca automáticamente al hacerse visible la escena
        });

        // Eventos de AR.js para informar al usuario
        scene.addEventListener('loaded', () => {
            setStatus('✅ Escena cargada. Buscando marcador...');
        });

        // Estos eventos se emiten en el marcador
        const marker = document.getElementById('marker');
        marker.addEventListener('markerFound', () => {
            setStatus('🎯 ¡Marcador detectado! Video en pantalla.');
        });
        marker.addEventListener('markerLost', () => {
            setStatus('🔍 Marcador perdido. Sigue apuntando.');
        });

        // Si hay error con el video de la cámara
        window.addEventListener('arjs-video-error', (e) => {
            setStatus('❌ Error al acceder a la cámara. Verifica permisos.');
            console.error('AR.js video error:', e.detail);
        });

        // Si el video de AR se carga correctamente
        window.addEventListener('arjs-video-loaded', () => {
            setStatus('📷 Cámara lista. Apunta al marcador Hiro.');
        });
    </script>
</body>
</html>
