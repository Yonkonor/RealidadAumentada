<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Video 3D en RA con marcador</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: sans-serif;
        }
        #info {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            z-index: 100;
            font-size: 14px;
            pointer-events: none;
        }
        .arjs-loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 15px 30px;
            border-radius: 30px;
            z-index: 200;
            font-size: 16px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="arjs-loader" id="loader">🎥 Cargando cámara...<br>Apunta al marcador</div>
    <div id="info">📷 Acerca la cámara a la imagen marcador</div>

    <!-- Escena de Realidad Aumentada -->
    <a-scene
        vr-mode-ui="enabled: false"
        embedded
        arjs="sourceType: webcam; trackingMethod: best; debugUIEnabled: false;"
        renderer="logarithmicDepthBuffer: true;"
    >
        <!-- Marcador: por defecto usamos el patrón "Hiro" (incluido en AR.js).
             Puedes cambiarlo más abajo por tu propia imagen. -->
        <a-marker preset="hiro" id="marker-video">
            <!-- Plano de video que aparece sobre el marcador -->
            <a-video
                src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4"
                width="0.9"
                height="0.5"
                position="0 0 0.1"
                rotation="-90 0 0"
                autoplay
                loop
                muted
                playsinline
                webkit-playsinline
                preload="auto"
            ></a-video>
        </a-marker>

        <!-- Cámara de AR -->
        <a-entity camera></a-entity>
    </a-scene>

    <!-- Librerías necesarias -->
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <!-- AR.js para tracking con marcadores -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <script>
        // Ocultar el mensaje de carga cuando la cámara esté lista
        window.addEventListener('arjs-video-loaded', () => {
            const loader = document.getElementById('loader');
            if (loader) {
                loader.style.display = 'none';
            }
        });
    </script>
</body>
</html>
