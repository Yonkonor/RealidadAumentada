<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Mi primera WebAR con AR.js</title>
    <!-- CSS simple para quitar márgenes y que la pantalla se use al 100% -->
    <style>
        body { margin: 0; overflow: hidden; font-family: Arial, Helvetica, sans-serif; }
        /* Este texto aparecerá antes de que la cámara se active o como ayuda */
        .info {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 8px;
            z-index: 10;
            pointer-events: none;
        }
    </style>
    
    <!-- 1. Importamos A-Frame (la base para la escena 3D) -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    
    <!-- 2. Importamos AR.js para convertir esa escena 3D en Realidad Aumentada -->
    <script src="https://cdn.jsdelivr.net/npm/ar.js@3.4.3/aframe/build/aframe-ar.js"></script>
</head>
<body>
    <!-- Escena AR: el atributo 'arjs' activa el seguimiento de marcadores -->
    <a-scene embedded arjs="detectionMode: mono_and_matrix; matrixCodeType: 3x3;">
        
        <!-- Marcador predefinido 'hiro': se descarga e imprime desde la URL que se ve abajo -->
        <a-marker preset="hiro">
            <!-- El elemento que aparecerá encima del marcador: un cubo rojo animado -->
            <a-box position="0 0.5 0" material="color: #FF3333;" scale="0.5 0.5 0.5"
                   animation="property: rotation; to: 0 360 0; loop: true; dur: 3000">
            </a-box>
        </a-marker>

        <!-- Cámara necesaria para que AR.js capture el vídeo y posicione los objetos -->
        <a-entity camera></a-entity>
    </a-scene>
    
    <div class="info">
        📍 Apunta la cámara al marcador HIRO para ver el cubo giratorio.
        <br>🔗 <a href="https://jeromeetienne.github.io/AR.js/data/images/HIRO.jpg" target="_blank" style="color: #aaa;">Descargar marcador HIRO</a> (imprimir o mostrar en otra pantalla)
    </div>
</body>
</html>
