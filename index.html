<!-- Marcador 1: video.patt / demo.mp4 -->
<a-marker type="pattern" url="./assets/video.patt" smoothing-factor="0.5">
  <a-video
    id="ar-video"
    src="./assets/demo.mp4"
    width="12.8"
    height="7.2"
    position="0 0 0"
    rotation="0 0 0"
    muted autoplay loop playsinline webkit-playsinline preload="auto"
  ></a-video>
</a-marker>
