<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>AR QR Scanner</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;600&display=swap');

    :root {
      --yellow:  #FFD600;
      --yellow2: #FFA000;
      --bg:      #0a0a0f;
      --text:    #e0e8ff;
      --dim:     rgba(255,255,255,0.15);
      --success: #00e5a0;
      --danger:  #ff4060;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: 'Exo 2', sans-serif;
      color: var(--text);
    }

    /* ── Camera ── */
    #video {
      position: fixed;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
    }

    /* ── AR canvas ── */
    #ar-canvas {
      position: fixed;
      inset: 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }

    /* ── HUD ── */
    #hud {
      position: fixed;
      inset: 0;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 28px 20px 36px;
    }

    #top-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(0,0,0,.6);
      backdrop-filter: blur(10px);
      border: 1px solid var(--dim);
      border-radius: 30px;
      padding: 8px 18px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px;
      letter-spacing: .08em;
      color: var(--yellow);
    }
    #top-bar .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--yellow);
      box-shadow: 0 0 8px var(--yellow);
      animation: blink 1.4s ease-in-out infinite;
    }
    @keyframes blink {
      0%,100% { opacity:1; transform:scale(1); }
      50%      { opacity:.3; transform:scale(.6); }
    }

    /* viewfinder */
    #finder {
      position: relative;
      width: min(220px, 58vw);
      height: min(220px, 58vw);
    }
    #finder::before, #finder::after,
    .fc::before,    .fc::after {
      content: '';
      position: absolute;
      width: 26px; height: 26px;
      border-color: var(--yellow);
      border-style: solid;
      opacity: .85;
    }
    #finder::before { top:0;    left:0;    border-width: 3px 0 0 3px; border-radius: 4px 0 0 0; }
    #finder::after  { top:0;    right:0;   border-width: 3px 3px 0 0; border-radius: 0 4px 0 0; }
    .fc::before     { bottom:0; left:0;    border-width: 0 0 3px 3px; border-radius: 0 0 0 4px; }
    .fc::after      { bottom:0; right:0;   border-width: 0 3px 3px 0; border-radius: 0 0 4px 0; }

    #scan-line {
      position: absolute;
      left: 8%; right: 8%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--yellow), transparent);
      box-shadow: 0 0 8px var(--yellow);
      animation: sweep 2s ease-in-out infinite;
    }
    @keyframes sweep {
      0%   { top: 8%;  opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      100% { top: 88%; opacity: 0; }
    }

    /* status pill */
    #status-pill {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(0,0,0,.65);
      backdrop-filter: blur(12px);
      border: 1px solid var(--dim);
      border-radius: 40px;
      padding: 10px 22px;
      font-size: 13px;
      max-width: 90vw;
      transition: border-color .3s, background .3s;
    }
    #status-pill.found {
      border-color: var(--success);
      background: rgba(0,229,160,.10);
    }
    #status-text {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      letter-spacing: .05em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 260px;
    }

    /* ── Start screen ── */
    #start-screen {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      z-index: 20;
      padding: 32px;
      text-align: center;
    }
    #start-screen .logo {
      font-family: 'Share Tech Mono', monospace;
      font-size: 13px;
      letter-spacing: .3em;
      color: var(--yellow);
      opacity: .7;
    }
    #start-screen h1 {
      font-size: clamp(24px, 6vw, 36px);
      font-weight: 600;
      letter-spacing: .05em;
    }
    #start-screen p {
      font-size: 14px;
      opacity: .5;
      max-width: 300px;
      line-height: 1.6;
    }
    #btn-start {
      margin-top: 8px;
      padding: 16px 40px;
      background: var(--yellow);
      color: #000;
      border: none;
      border-radius: 50px;
      font-family: 'Exo 2', sans-serif;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: .08em;
      cursor: pointer;
      pointer-events: all;
      box-shadow: 0 0 32px rgba(255,214,0,.35);
      transition: transform .15s, box-shadow .15s;
    }
    #btn-start:hover { transform: scale(1.04); box-shadow: 0 0 48px rgba(255,214,0,.55); }
    #btn-start:active { transform: scale(.97); }

    /* ── Error screen ── */
    #error-screen {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--bg);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 32px;
      z-index: 20;
      text-align: center;
    }
    #error-screen .icon { font-size: 52px; }
    #error-screen h2    { color: var(--danger); font-size: 18px; }
    #error-screen p     { opacity: .55; font-size: 13px; line-height: 1.7; max-width: 320px; }
    #btn-retry {
      margin-top: 8px;
      padding: 12px 32px;
      background: transparent;
      color: var(--yellow);
      border: 1.5px solid var(--yellow);
      border-radius: 50px;
      font-family: 'Exo 2', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      pointer-events: all;
      transition: background .2s;
    }
    #btn-retry:hover { background: rgba(255,214,0,.1); }
  </style>
</head>
<body>

<!-- Start screen -->
<div id="start-screen">
  <div class="logo">REALIDAD AUMENTADA</div>
  <h1>AR · QR Scanner</h1>
  <p>Apuntá la cámara a cualquier código QR y aparecerá un objeto AR encima.</p>
  <button id="btn-start">INICIAR CÁMARA</button>
</div>

<!-- Error screen -->
<div id="error-screen">
  <div class="icon">📷</div>
  <h2>Sin acceso a cámara</h2>
  <p id="error-msg">Permitir el acceso a la cámara en el navegador para usar la realidad aumentada.</p>
  <button id="btn-retry">REINTENTAR</button>
</div>

<!-- Camera feed -->
<video id="video" autoplay playsinline muted></video>

<!-- AR canvas -->
<canvas id="ar-canvas"></canvas>

<!-- HUD (only visible after camera starts) -->
<div id="hud" style="display:none;">
  <div id="top-bar">
    <div class="dot"></div>
    AR · QR TRACKER
  </div>
  <div id="finder">
    <div class="fc"></div>
    <div id="scan-line"></div>
  </div>
  <div id="status-pill">
    <span id="status-icon">🔍</span>
    <span id="status-text">BUSCANDO CÓDIGO QR…</span>
  </div>
</div>

<!-- jsQR from CDN -->
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>

<script>
  /* ──────────────────────────────────────────────────────────
     Elements
  ────────────────────────────────────────────────────────── */
  const startScreen = document.getElementById('start-screen');
  const errorScreen = document.getElementById('error-screen');
  const errorMsg    = document.getElementById('error-msg');
  const btnStart    = document.getElementById('btn-start');
  const btnRetry    = document.getElementById('btn-retry');
  const video       = document.getElementById('video');
  const arCanvas    = document.getElementById('ar-canvas');
  const hud         = document.getElementById('hud');
  const statusPill  = document.getElementById('status-pill');
  const statusIcon  = document.getElementById('status-icon');
  const statusText  = document.getElementById('status-text');
  const ctx         = arCanvas.getContext('2d');

  // Off-screen canvas for jsQR
  const proc    = document.createElement('canvas');
  const procCtx = proc.getContext('2d', { willReadFrequently: true });

  let lastFound = false;

  /* ──────────────────────────────────────────────────────────
     Resize
  ────────────────────────────────────────────────────────── */
  function resize() {
    arCanvas.width  = window.innerWidth;
    arCanvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  /* ──────────────────────────────────────────────────────────
     Camera
  ────────────────────────────────────────────────────────── */
  async function startCamera() {
    try {
      // Try back camera first, fall back to any camera
      let stream;
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } },
          audio: false
        });
      } catch (e) {
        stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
      }

      video.srcObject = stream;
      await video.play();

      startScreen.style.display = 'none';
      errorScreen.style.display = 'none';
      hud.style.display         = 'flex';

      loop();
    } catch (err) {
      startScreen.style.display = 'none';
      errorScreen.style.display = 'flex';
      let msg = 'No se pudo acceder a la cámara.';
      if (err.name === 'NotAllowedError')   msg = 'Permiso denegado. Habilitá la cámara en la configuración del navegador y recargá la página.';
      if (err.name === 'NotFoundError')     msg = 'No se encontró ninguna cámara en este dispositivo.';
      if (err.name === 'NotSupportedError') msg = 'Este navegador no soporta acceso a la cámara. Probá con Chrome o Safari sobre HTTPS.';
      if (err.name === 'NotReadableError')  msg = 'La cámara está siendo usada por otra aplicación.';
      errorMsg.textContent = msg + ' (' + err.name + ')';
    }
  }

  btnStart.addEventListener('click', startCamera);
  btnRetry.addEventListener('click', () => {
    errorScreen.style.display = 'none';
    startScreen.style.display = 'flex';
  });

  /* ──────────────────────────────────────────────────────────
     Map video coords → canvas coords  (object-fit: cover)
  ────────────────────────────────────────────────────────── */
  function mapPt(px, py, vw, vh, cw, ch) {
    const vA = vw / vh, cA = cw / ch;
    let sc, ox, oy;
    if (vA > cA) { sc = ch / vh; ox = (cw - vw * sc) / 2; oy = 0; }
    else         { sc = cw / vw; ox = 0; oy = (ch - vh * sc) / 2; }
    return { x: px * sc + ox, y: py * sc + oy };
  }

  /* ──────────────────────────────────────────────────────────
     Draw AR square
  ────────────────────────────────────────────────────────── */
  function drawARSquare(tl, tr, br, bl) {
    // Glow fill
    ctx.save();
    ctx.shadowColor = 'rgba(255,214,0,0.55)';
    ctx.shadowBlur  = 30;
    ctx.beginPath();
    ctx.moveTo(tl.x, tl.y);
    ctx.lineTo(tr.x, tr.y);
    ctx.lineTo(br.x, br.y);
    ctx.lineTo(bl.x, bl.y);
    ctx.closePath();
    ctx.fillStyle = 'rgba(255,214,0,0.70)';
    ctx.fill();
    ctx.restore();

    // Border
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(tl.x, tl.y);
    ctx.lineTo(tr.x, tr.y);
    ctx.lineTo(br.x, br.y);
    ctx.lineTo(bl.x, bl.y);
    ctx.closePath();
    ctx.strokeStyle = '#FFD600';
    ctx.lineWidth   = 3;
    ctx.stroke();
    ctx.restore();

    // Corner dots
    [tl, tr, br, bl].forEach(pt => {
      ctx.save();
      ctx.fillStyle   = '#FFA000';
      ctx.shadowColor = 'rgba(255,160,0,0.9)';
      ctx.shadowBlur  = 14;
      ctx.beginPath();
      ctx.arc(pt.x, pt.y, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    });

    // Diagonal lines
    ctx.save();
    ctx.strokeStyle = 'rgba(255,214,0,0.20)';
    ctx.lineWidth   = 1;
    ctx.setLineDash([4, 6]);
    ctx.beginPath();
    ctx.moveTo(tl.x, tl.y); ctx.lineTo(br.x, br.y);
    ctx.moveTo(tr.x, tr.y); ctx.lineTo(bl.x, bl.y);
    ctx.stroke();
    ctx.restore();
  }

  /* ──────────────────────────────────────────────────────────
     Scan loop
  ────────────────────────────────────────────────────────── */
  function loop() {
    requestAnimationFrame(loop);

    if (video.readyState < video.HAVE_ENOUGH_DATA) return;

    const vw = video.videoWidth;
    const vh = video.videoHeight;
    if (vw === 0 || vh === 0) return;

    const cw = arCanvas.width;
    const ch = arCanvas.height;

    proc.width  = vw;
    proc.height = vh;
    procCtx.drawImage(video, 0, 0, vw, vh);

    const imgData = procCtx.getImageData(0, 0, vw, vh);
    const code    = jsQR(imgData.data, vw, vh, { inversionAttempts: 'dontInvert' });

    ctx.clearRect(0, 0, cw, ch);

    if (code) {
      const loc = code.location;
      const tl  = mapPt(loc.topLeftCorner.x,     loc.topLeftCorner.y,     vw, vh, cw, ch);
      const tr  = mapPt(loc.topRightCorner.x,    loc.topRightCorner.y,    vw, vh, cw, ch);
      const br  = mapPt(loc.bottomRightCorner.x, loc.bottomRightCorner.y, vw, vh, cw, ch);
      const bl  = mapPt(loc.bottomLeftCorner.x,  loc.bottomLeftCorner.y,  vw, vh, cw, ch);

      drawARSquare(tl, tr, br, bl);

      if (!lastFound) {
        statusPill.classList.add('found');
        statusIcon.textContent = '✓';
      }
      lastFound = true;
      const label = code.data.length > 36 ? code.data.slice(0, 33) + '…' : code.data;
      statusText.textContent = label;
    } else {
      if (lastFound) {
        statusPill.classList.remove('found');
        statusIcon.textContent = '🔍';
        statusText.textContent = 'BUSCANDO CÓDIGO QR…';
      }
      lastFound = false;
    }
  }
</script>
</body>
</html>
