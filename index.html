<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>RA Hiro - Con botón de inicio</title>
    <!-- A-Frame -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <!-- AR.js v2 -->
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.3.5/aframe/build/aframe-ar.min.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        #start-btn {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 40px;
            background: #0077ff;
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 18px;
            z-index: 100;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        #start-btn:active {
            background: #0055cc;
        }
    </style>
</head>
<body>
    <button id="start-btn">Iniciar Realidad Aumentada</button>

    <a-scene id="ar-scene" embedded arjs="sourceType: webcam; debugUIEnabled: true; detectionMode: mono_and_matrix; matrixCodeType: 3x3;" 
             vr-mode-ui="enabled: false" 
             renderer="antialias: true; precision: medium;"
             style="visibility: hidden;">
        <!-- Marcador Hiro predefinido -->
        <a-marker preset="hiro" id="hiro-marker">
            <!-- Esfera de ejemplo (planeta) -->
            <a-sphere position="0 0.75 0" radius="0.5" color="tomato"
                      animation="property: rotation; to: 0 360 0; loop: true; dur: 20000; easing: linear;">
            </a-sphere>
            <a-text value="¡Funciona!" position="0 1.5 0" align="center" color="white" scale="1.5 1.5 1.5"></a-text>
        </a-marker>
        <!-- Cámara -->
        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const btn = document.getElementById('start-btn');
        const scene = document.getElementById('ar-scene');

        btn.addEventListener('click', () => {
            // Mostrar la escena y solicitar acceso a la cámara
            scene.style.visibility = 'visible';
            btn.style.display = 'none';

            // En algunos dispositivos es necesario forzar la inicialización de AR.js
            if (scene.components['arjs']) {
                scene.components['arjs'].arToolkitSource.init(() => {
                    console.log('Cámara lista');
                });
            }
        });

        // Si el marcador se detecta, opcionalmente ocultar el botón
        const marker = document.getElementById('hiro-marker');
        marker.addEventListener('markerFound', () => {
            console.log('¡Marcador encontrado!');
        });
        marker.addEventListener('markerLost', () => {
            console.log('Marcador perdido');
        });
    </script>
</body>
</html>
