<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>AR Video Grande con Sonido</title>

  <!-- A-Frame + AR.js -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      overflow: hidden;
      background: #000;
      font-family: system-ui, -apple-system, sans-serif;
    }

    a-scene {
      width: 100vw;
      height: 100vh;
    }

    /* UI inferior (no interactiva) */
    #ui {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      padding: 20px 16px 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      pointer-events: none;
      z-index: 999;
    }

    #status {
      background: rgba(10, 10, 30, 0.75);
      backdrop-filter: blur(8px);
      color: #fff;
      padding: 11px 22px;
      border-radius: 24px;
      font-size: 15px;
      font-weight: 500;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.18);
      transition: background 0.4s ease, border-color 0.4s ease;
      letter-spacing: 0.01em;
    }

    #status.found {
      background: rgba(0, 180, 90, 0.8);
      border-color: rgba(0, 255, 130, 0.35);
    }

    #hint {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.45);
      text-align: center;
    }

    #loading {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 9999;
      transition: opacity 0.6s ease;
    }

    #loading.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(0, 212, 255, 0.2);
      border-top-color: #00d4ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #loading p {
      color: rgba(255,255,255,0.6);
      font-size: 14px;
    }

    /* Botón de sonido (interactivo, por fuera del UI no interactivo) */
    #audio-btn {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      pointer-events: auto;
      background: rgba(0, 180, 90, 0.9);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.3);
      color: white;
      padding: 12px 28px;
      border-radius: 40px;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.5px;
      cursor: pointer;
      display: none; /* oculto por defecto */
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
      transition: background 0.3s ease, opacity 0.3s ease;
    }

    #audio-btn:active {
      background: rgba(0, 140, 70, 0.9);
    }

    /* Mostrar solo cuando tenga la clase .visible */
    #audio-btn.visible {
      display: block;
    }
  </style>
</head>
<body>

  <div id="loading">
    <div class="spinner"></div>
    <p>Iniciando cámara…</p>
  </div>

  <!-- Botón de sonido (fuera del #ui para que sea cliqueable) -->
  <button id="audio-btn">🔊 Activar sonido</button>

  <div id="ui">
    <div id="status">📷 Apuntá la cámara al marcador Hiro</div>
    <div id="hint">Necesitás el marcador impreso o en otra pantalla</div>
  </div>

  <a-scene
    arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix;"
    renderer="logarithmicDepthBuffer: true; antialias: true; alpha: true; precision: mediump;"
    vr-mode-ui="enabled: false"
    loading-screen="enabled: false"
  >

    <!-- Marcador con suavizado alto -->
    <a-marker preset="hiro" smoothing-factor="0.95">

      <!-- Video: tamaño grande, arranca muteado, se activa con el botón -->
      <a-video
        id="ar-video"
        src="./assets/demo.mp4"
        width="3.2"
        height="1.8"
        position="0 0.9 0"
        rotation="-90 0 0"
        muted
        autoplay
        loop
        playsinline
        webkit-playsinline
        preload="auto"
      ></a-video>

    </a-marker>

    <a-entity camera></a-entity>

  </a-scene>

  <script>
    const marker    = document.querySelector('a-marker');
    const status    = document.getElementById('status');
    const hint      = document.getElementById('hint');
    const loading   = document.getElementById('loading');
    const audioBtn  = document.getElementById('audio-btn');
    const video     = document.getElementById('ar-video');

    const scene = document.querySelector('a-scene');
    scene.addEventListener('loaded', () => {
      setTimeout(() => loading.classList.add('hidden'), 800);
    });

    // Eventos del marcador
    marker.addEventListener('markerFound', () => {
      status.textContent = '✨ ¡Video reproduciéndose!';
      status.classList.add('found');
      hint.textContent = 'Mové el teléfono para verlo en 3D';

      // Mostrar el botón de sonido solo si el video está muteado
      if (video && video.muted) {
        audioBtn.classList.add('visible');
      }
    });

    marker.addEventListener('markerLost', () => {
      status.textContent = '📷 Apuntá la cámara al marcador Hiro';
      status.classList.remove('found');
      hint.textContent = 'Necesitás el marcador impreso o en otra pantalla';

      // Ocultar el botón al perder el marcador
      audioBtn.classList.remove('visible');
    });

    // Lógica del botón: activar audio con un toque
    audioBtn.addEventListener('click', () => {
      if (video) {
        video.muted = false;
        video.play().catch(err => console.warn('Error al reproducir con sonido:', err));
        audioBtn.classList.remove('visible');
      }
    });

    // Por si el video ya fue desmuteado por otra razón, ocultar botón
    if (video) {
      video.addEventListener('volumechange', () => {
        if (!video.muted) {
          audioBtn.classList.remove('visible');
        }
      });
    }
  </script>

</body>
</html>
