<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>RA con Marcador Hiro</title>
    <!-- A-Frame -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <!-- AR.js v2 (detección de marcadores) -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin:0; overflow:hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        <!-- Marcador Hiro (predefinido) -->
        <a-marker preset="hiro">
            <!-- Ejemplo: un planeta Tierra giratorio sobre el marcador -->
            <a-sphere position="0 0.75 0" radius="0.5"
                      material="src: url(https://cdn.jsdelivr.net/npm/three-globe/example/img/earth-blue-marble.jpg);"
                      animation="property: rotation; to: 0 360 0; loop: true; dur: 20000; easing: linear;">
            </a-sphere>
            <!-- Anillo opcional alrededor del planeta -->
            <a-ring position="0 0.75 0" radius-inner="0.55" radius-outer="0.6"
                    rotation="90 0 0" color="#4CC3D9" opacity="0.5"></a-ring>
        </a-marker>
        <!-- Cámara -->
        <a-entity camera></a-entity>
    </a-scene>
</body>
</html>
