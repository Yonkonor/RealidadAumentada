<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>AR Marcador Hiro · Imagen 3D</title>

  <!-- A-Frame -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/aframe/1.5.0/aframe.min.js"></script>
  <!-- AR.js para A-Frame -->
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Courier New', monospace;
      background: #0a0a0f;
      color: #e0e0ff;
      overflow: hidden;
    }

    /* ── HUD overlay ── */
    #hud {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 999;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    #header {
      width: 100%;
      background: linear-gradient(180deg, rgba(0,0,0,0.85) 0%, transparent 100%);
      padding: 14px 20px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    #title {
      font-size: 13px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #a0a8ff;
      text-shadow: 0 0 12px rgba(140,140,255,0.8);
    }

    #status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #ff4466;
      box-shadow: 0 0 8px #ff4466;
      animation: pulse 1.5s ease-in-out infinite;
    }
    #status-dot.found {
      background: #44ffaa;
      box-shadow: 0 0 12px #44ffaa;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(0.7); }
    }

    /* ── Instrucciones ── */
    #instructions {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 999;
      pointer-events: none;
      background: linear-gradient(0deg, rgba(0,0,0,0.88) 0%, transparent 100%);
      padding: 28px 20px 20px;
      text-align: center;
    }

    #instructions p {
      font-size: 12px;
      letter-spacing: 2px;
      color: #7080cc;
      text-transform: uppercase;
    }

    #instructions .highlight {
      color: #a0a8ff;
      text-shadow: 0 0 8px rgba(140,140,255,0.6);
    }

    /* ── Scanlines decorativas ── */
    #scanlines {
      position: fixed;
      inset: 0;
      z-index: 998;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,255,0.015) 2px,
        rgba(0,0,255,0.015) 4px
      );
    }

    /* ── Corner brackets ── */
    .corner {
      position: fixed;
      z-index: 999;
      width: 40px; height: 40px;
      pointer-events: none;
    }
    .corner::before, .corner::after {
      content: '';
      position: absolute;
      background: #a0a8ff;
      box-shadow: 0 0 6px #a0a8ff;
    }
    .corner::before { width: 2px; height: 100%; }
    .corner::after  { width: 100%; height: 2px; }

    .corner.tl { top: 10px; left: 10px; }
    .corner.tr { top: 10px; right: 10px; transform: scaleX(-1); }
    .corner.bl { bottom: 10px; left: 10px; transform: scaleY(-1); }
    .corner.br { bottom: 10px; right: 10px; transform: scale(-1); }

    /* ── Link al marcador ── */
    #marker-hint {
      position: fixed;
      top: 60px; right: 16px;
      z-index: 999;
      pointer-events: all;
      background: rgba(10,10,30,0.85);
      border: 1px solid #3040aa;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 10px;
      letter-spacing: 2px;
      color: #7080cc;
      text-decoration: none;
      text-transform: uppercase;
      transition: all 0.2s;
      backdrop-filter: blur(4px);
    }
    #marker-hint:hover {
      color: #a0a8ff;
      border-color: #a0a8ff;
      box-shadow: 0 0 12px rgba(140,140,255,0.4);
    }

    /* Fuerza que el canvas de A-Frame ocupe toda la pantalla */
    a-scene { width: 100vw; height: 100vh; }
  </style>
</head>
<body>

  <!-- ══ HUD ══ -->
  <div id="hud">
    <div id="header">
      <span id="title">AR · Hiro Marker</span>
      <div id="status-dot" title="Buscando marcador…"></div>
    </div>
  </div>

  <div id="scanlines"></div>
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <a href="hiro-marker.png" target="_blank" id="marker-hint">📄 Ver marcador</a>

  <div id="instructions">
    <p>Apuntá la cámara al <span class="highlight">marcador Hiro</span> para ver la imagen en 3D</p>
  </div>

  <!-- ══ ESCENA A-FRAME + AR.js ══ -->
  <a-scene
    embedded
    arjs="sourceType: webcam;
          detectionMode: mono_and_matrix;
          matrixCodeType: 3x3;
          debugUIEnabled: false;"
    vr-mode-ui="enabled: false"
    renderer="logarithmicDepthBuffer: true; antialias: true;"
    id="arScene"
  >

    <!-- Assets -->
    <a-assets>
      <!--
        La imagen que se mostrará en AR.
        Podés reemplazar "imagen.png" por cualquier imagen en el mismo directorio,
        o usar una URL pública: src="https://…/imagen.png"
      -->
      <img id="arTextura" src="imagen.png" crossorigin="anonymous" />
    </a-assets>

    <!-- Marcador HIRO -->
    <a-marker preset="hiro" id="hiMarker">

      <!--
        Plano flotante con la imagen.
        position="0 0.1 0"  →  X=0, Y=0.1 (≈10 cm sobre el marcador), Z=0
        rotation="-90 0 0"  →  plano horizontal (paralelo al marcador)

        Cambiá width / height para ajustar el tamaño de la imagen en escena.
        1 unidad A-Frame = 1 metro en AR.js con marcador Hiro estándar (~18 cm).
        Con width="1" la imagen mide aprox. 18 cm de ancho sobre la mesa.
      -->
      <a-plane
        src="#arTextura"
        position="0 0.1 0"
        rotation="-90 0 0"
        width="1"
        height="1"
        material="side: double; transparent: true; alphaTest: 0.1;"
        animation="property: rotation;
                   to: -90 360 0;
                   dur: 8000;
                   easing: linear;
                   loop: true;"
      ></a-plane>

      <!-- Sombra/halo sutil bajo la imagen -->
      <a-circle
        position="0 0.001 0"
        rotation="-90 0 0"
        radius="0.55"
        color="#6070ff"
        opacity="0.18"
        material="side: double;"
      ></a-circle>

    </a-marker>

    <!-- Cámara AR -->
    <a-entity camera></a-entity>

  </a-scene>

  <script>
    // ── Feedback visual: detectado / no detectado ──
    const dot   = document.getElementById('status-dot');
    const marker = document.getElementById('hiMarker');

    marker.addEventListener('markerFound', () => {
      dot.classList.add('found');
      dot.title = '¡Marcador detectado!';
    });

    marker.addEventListener('markerLost', () => {
      dot.classList.remove('found');
      dot.title = 'Buscando marcador…';
    });
  </script>

</body>
</html>
