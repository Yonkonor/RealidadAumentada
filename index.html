<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Video flotante RA</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.rawgit.com/jeromeetienne/AR.js/2.2.1/aframe/build/aframe-ar.js"></script>
  </head>
  <body style="margin:0; overflow:hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      
      <!-- Marcador QR (puedes reemplazar por tu propio patrón QR) -->
      <a-marker type="pattern" url="qr-marker.patt">
        <!-- Plano donde se incrusta el video -->
        <a-video 
          src="https://www.youtube.com/embed/I9rWj2blNKk?autoplay=1&controls=0"
          width="0.3" height="0.3" position="0 0 0.05">
        </a-video>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
