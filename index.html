<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AR: Cuadrado Amarillo 30cm sobre QR</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            margin: 0;
            overflow: hidden;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #111;
        }
        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #000;
        }
        #video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            z-index: 1;
        }
        #canvas-ar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            z-index: 2;
            background: transparent;
        }
        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 16px;
            z-index: 3;
            color: white;
            font-size: 14px;
            font-weight: 500;
            border: 1px solid rgba(255,215,0,0.4);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            transition: all 0.2s;
            pointer-events: auto;
        }
        .status-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 12px;
        }
        .badge {
            background: #2c3e50;
            padding: 6px 14px;
            border-radius: 40px;
            font-family: monospace;
            font-weight: bold;
            font-size: 13px;
        }
        .badge.qr {
            background: #f1c40f;
            color: #1e1e2a;
        }
        .badge.object {
            background: #e67e22;
        }
        .btn-start {
            background: #2ecc71;
            border: none;
            padding: 10px 24px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 16px;
            color: black;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
            margin-top: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .btn-start:hover {
            background: #27ae60;
            transform: scale(0.98);
        }
        .size-control {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(0,0,0,0.5);
            padding: 6px 12px;
            border-radius: 48px;
            margin-top: 8px;
            justify-content: space-between;
        }
        .size-buttons button {
            background: #f1c40f;
            border: none;
            font-size: 18px;
            font-weight: bold;
            width: 34px;
            border-radius: 30px;
            cursor: pointer;
            margin: 0 4px;
        }
        .footnote {
            font-size: 10px;
            opacity: 0.7;
            margin-top: 10px;
            text-align: center;
        }
        button {
            pointer-events: auto;
        }
        @media (min-width: 640px) {
            .controls {
                left: auto;
                right: 20px;
                bottom: 20px;
                width: 320px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas-ar"></canvas>
    <div class="controls">
        <div class="status-row">
            <span class="badge qr" id="qr-status">🔍 QR: NO DETECTADO</span>
            <span class="badge object" id="object-status">⚫ OBJETO: OCULTO</span>
        </div>
        <button id="start-camera-btn" class="btn-start">📷 INICIAR CÁMARA Y AR</button>
        <div class="size-control">
            <span>📏 Tamaño real del QR:</span>
            <div class="size-buttons">
                <button id="dec-size">−</button>
                <strong id="qr-real-size-display">10 cm</strong>
                <button id="inc-size">+</button>
            </div>
        </div>
        <div class="footnote">
            ✅ Apunta a un QR impreso (tamaño físico: <span id="size-note">10</span> cm de lado).<br>
            🟨 Al detectarlo, aparecerá un cuadrado AMARILLO de <strong>30x30 cm</strong> flotando sobre él.
        </div>
    </div>
</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
            "jsqr": "https://unpkg.com/jsqr@1.4.0/dist/jsQR.js"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import jsQR from 'jsqr';
    
    // ----- ELEMENTOS DOM -----
    const video = document.getElementById('video');
    const canvasAR = document.getElementById('canvas-ar');
    const startBtn = document.getElementById('start-camera-btn');
    const qrStatusSpan = document.getElementById('qr-status');
    const objectStatusSpan = document.getElementById('object-status');
    const qrSizeDisplay = document.getElementById('qr-real-size-display');
    const sizeNoteSpan = document.getElementById('size-note');
    const incBtn = document.getElementById('inc-size');
    const decBtn = document.getElementById('dec-size');
    
    // ----- PARÁMETROS FÍSICOS -----
    let realQRSizeMeters = 0.10;       // 10 cm por defecto
    const OBJECT_SIZE_METERS = 0.30;   // 30 cm amarillo
    const DEFAULT_VFOV_DEG = 65;       // campo visual vertical estimado
    
    // ----- ESTADO -----
    let cameraActive = false;
    let qrDetected = false;
    let arObject = null;           // malla Three.js
    let scene, camera, renderer;
    let videoWidth = 0, videoHeight = 0;
    let focalLenPx = 800;          // se recalcula con el tamaño del video
    
    // ----- FUNCIONES UI -----
    function updateQRSizeUI() {
        const cm = (realQRSizeMeters * 100).toFixed(0);
        qrSizeDisplay.innerText = `${cm} cm`;
        sizeNoteSpan.innerText = cm;
    }
    
    incBtn.addEventListener('click', () => {
        realQRSizeMeters = Math.min(0.30, realQRSizeMeters + 0.01);
        updateQRSizeUI();
    });
    decBtn.addEventListener('click', () => {
        realQRSizeMeters = Math.max(0.05, realQRSizeMeters - 0.01);
        updateQRSizeUI();
    });
    
    // ----- INICIALIZAR THREE.JS (escena transparente) -----
    function initThree() {
        renderer = new THREE.WebGLRenderer({ canvas: canvasAR, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x000000, 0);
        
        scene = new THREE.Scene();
        scene.background = null;
        
        // Cámara Three.js (se sincronizará con el video)
        camera = new THREE.PerspectiveCamera(DEFAULT_VFOV_DEG, window.innerWidth / window.innerHeight, 0.01, 5);
        camera.position.set(0, 0, 0);
        
        // Luces
        const ambient = new THREE.AmbientLight(0x404060);
        scene.add(ambient);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(1, 2, 1);
        scene.add(dirLight);
        const fillLight = new THREE.PointLight(0xffaa66, 0.4);
        fillLight.position.set(0.5, 1, 0.8);
        scene.add(fillLight);
        
        // Cuadrado amarillo plano (30cm x 30cm)
        const geometry = new THREE.PlaneGeometry(OBJECT_SIZE_METERS, OBJECT_SIZE_METERS);
        const material = new THREE.MeshStandardMaterial({
            color: 0xFFD700,
            emissive: 0x442200,
            emissiveIntensity: 0.2,
            metalness: 0.1,
            roughness: 0.3,
            side: THREE.DoubleSide
        });
        arObject = new THREE.Mesh(geometry, material);
        // Borde decorativo
        const edges = new THREE.EdgesGeometry(geometry);
        const wire = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0xFFAA33 }));
        arObject.add(wire);
        arObject.visible = false;
        scene.add(arObject);
        
        animate();
    }
    
    function animate() {
        requestAnimationFrame(animate);
        if (renderer && camera && scene) {
            if (arObject && arObject.visible) {
                // Billboard: siempre mirando a la cámara
                arObject.lookAt(camera.position);
            }
            renderer.render(scene, camera);
        }
    }
    
    // ----- ACTUALIZAR PROYECCIÓN DE CÁMARA SEGÚN VIDEO -----
    function updateCameraProjection(videoW, videoH) {
        if (videoW === 0 || videoH === 0) return;
        const aspect = videoW / videoH;
        camera.aspect = aspect;
        camera.fov = DEFAULT_VFOV_DEG;
        camera.updateProjectionMatrix();
        // Calcular focal length en píxeles (para fórmula distancia)
        const vFOVrad = DEFAULT_VFOV_DEG * Math.PI / 180;
        focalLenPx = (videoH / 2) / Math.tan(vFOVrad / 2);
        // Ajustar tamaño del renderer al contenedor
        renderer.setSize(window.innerWidth, window.innerHeight);
    }
    
    // ----- ESTIMAR DISTANCIA (metros) según tamaño en píxeles del QR -----
    function estimateDistance(qrWidthPx) {
        if (qrWidthPx <= 0 || focalLenPx <= 0) return 0.5;
        let dist = (realQRSizeMeters * focalLenPx) / qrWidthPx;
        return Math.min(2.0, Math.max(0.12, dist));
    }
    
    // ----- CONVERTIR coordenadas píxel a NDC (rango -1..1) -----
    function pixelToNDC(px, py, w, h) {
        const ndcX = (px / w) * 2 - 1;
        const ndcY = -(py / h) * 2 + 1;
        return { x: ndcX, y: ndcY };
    }
    
    // ----- Obtener dirección 3D desde cámara hacia NDC -----
    function getRayDirection(ndcX, ndcY, cam) {
        const vec = new THREE.Vector3(ndcX, ndcY, 0.5);
        vec.unproject(cam);
        return vec.sub(cam.position).normalize();
    }
    
    // ----- POSICIONAR el cuadrado en el mundo 3D (sobre el QR) -----
    function positionARObject(centerNDC, distanceMeters) {
        if (!arObject) return;
        const direction = getRayDirection(centerNDC.x, centerNDC.y, camera);
        const newPos = camera.position.clone().add(direction.multiplyScalar(distanceMeters));
        arObject.position.copy(newPos);
        // Orientación: siempre hacia la cámara, pero el plano mira hacia +Z por defecto
        arObject.lookAt(camera.position);
    }
    
    // ----- DETECTAR QR EN UN FRAME (video) -----
    async function detectQRFromVideo() {
        if (!cameraActive || videoWidth === 0 || videoHeight === 0) return;
        
        // Capturar frame actual
        const canvas = document.createElement('canvas');
        canvas.width = videoWidth;
        canvas.height = videoHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, videoWidth, videoHeight);
        const imageData = ctx.getImageData(0, 0, videoWidth, videoHeight);
        
        const code = jsQR(imageData.data, imageData.width, imageData.height, {
            inversionAttempts: "dontInvert",
        });
        
        if (code) {
            // QR detectado
            if (!qrDetected) {
                qrDetected = true;
                qrStatusSpan.innerHTML = "✅ QR DETECTADO - Posicionando objeto";
                qrStatusSpan.style.background = "#2ecc71";
                arObject.visible = true;
                objectStatusSpan.innerHTML = "🟨 OBJETO VISIBLE (30cm)";
                objectStatusSpan.style.background = "#f39c12";
            }
            
            // Calcular ancho promedio del QR en píxeles
            const { location } = code;
            const topW = Math.hypot(location.topRightCorner.x - location.topLeftCorner.x, location.topRightCorner.y - location.topLeftCorner.y);
            const bottomW = Math.hypot(location.bottomRightCorner.x - location.bottomLeftCorner.x, location.bottomRightCorner.y - location.bottomLeftCorner.y);
            const avgWidthPx = (topW + bottomW) / 2;
            
            // Centro del QR (píxeles)
            const cx = (location.topLeftCorner.x + location.topRightCorner.x + location.bottomRightCorner.x + location.bottomLeftCorner.x) / 4;
            const cy = (location.topLeftCorner.y + location.topRightCorner.y + location.bottomLeftCorner.y + location.bottomRightCorner.y) / 4;
            
            const ndc = pixelToNDC(cx, cy, videoWidth, videoHeight);
            const distance = estimateDistance(avgWidthPx);
            
            positionARObject(ndc, distance);
            
            // Actualizar estado con distancia
            qrStatusSpan.innerHTML = `✅ QR | Distancia: ${distance.toFixed(2)}m | Ancho: ${Math.round(avgWidthPx)}px`;
        } else {
            if (qrDetected) {
                qrDetected = false;
                qrStatusSpan.innerHTML = "🔍 QR: NO DETECTADO";
                qrStatusSpan.style.background = "#f1c40f";
                arObject.visible = false;
                objectStatusSpan.innerHTML = "⚫ OBJETO OCULTO";
                objectStatusSpan.style.background = "#e67e22";
            }
        }
    }
    
    // ----- BUCLE DE DETECCIÓN (cada frame) -----
    let detectionInterval = null;
    function startDetectionLoop() {
        if (detectionInterval) clearInterval(detectionInterval);
        detectionInterval = setInterval(() => {
            if (cameraActive && video.readyState >= 2 && videoWidth && videoHeight) {
                detectQRFromVideo();
            }
        }, 100); // 10 fps es suficiente, no sobrecarga
    }
    
    // ----- INICIAR CÁMARA (con botón, evita bloqueo autoplay) -----
    async function startCamera() {
        if (cameraActive) {
            // ya activa, no hacer nada
            return;
        }
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } }
            });
            video.srcObject = stream;
            await video.play();
            
            // Esperar dimensiones reales
            await new Promise((resolve) => {
                const check = () => {
                    if (video.videoWidth && video.videoHeight) {
                        videoWidth = video.videoWidth;
                        videoHeight = video.videoHeight;
                        resolve();
                    } else {
                        requestAnimationFrame(check);
                    }
                };
                check();
            });
            
            cameraActive = true;
            updateCameraProjection(videoWidth, videoHeight);
            // Ajustar el canvas al tamaño del video (importante para la proyección)
            renderer.setSize(videoWidth, videoHeight);
            canvasAR.style.width = `${videoWidth}px`;
            canvasAR.style.height = `${videoHeight}px`;
            
            startDetectionLoop();
            startBtn.innerText = "✅ CÁMARA ACTIVA";
            startBtn.style.background = "#2ecc71";
            startBtn.disabled = true;
            qrStatusSpan.innerText = "🔍 ESCANEANDO QR...";
            console.log(`Cámara iniciada: ${videoWidth}x${videoHeight}, focalLenPx: ${focalLenPx}`);
        } catch (err) {
            console.error("Error cámara:", err);
            qrStatusSpan.innerText = "❌ ERROR: Permisos o cámara no disponible";
            qrStatusSpan.style.background = "#e74c3c";
            alert("No se pudo acceder a la cámara. Verifica permisos y conexión HTTPS (o localhost).");
        }
    }
    
    // ----- REDIMENSIONAR AL CAMBIAR TAMAÑO VENTANA -----
    function handleWindowResize() {
        if (videoWidth && videoHeight) {
            const aspectCam = videoWidth / videoHeight;
            camera.aspect = aspectCam;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        } else {
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    }
    
    // ----- INICIALIZACIÓN -----
    function init() {
        initThree();
        window.addEventListener('resize', handleWindowResize);
        startBtn.addEventListener('click', startCamera);
        updateQRSizeUI();
        // Mostrar mensaje inicial
        qrStatusSpan.innerText = "📌 Presiona 'Iniciar Cámara'";
        objectStatusSpan.innerText = "⚪ ESPERANDO";
    }
    
    init();
</script>
</body>
</html>
