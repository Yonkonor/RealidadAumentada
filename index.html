<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Video 3D RA - Marcador Hiro</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: sans-serif;
            background: #000;
        }
        #start-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            color: white;
            text-align: center;
        }
        #start-btn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            border-radius: 30px;
            margin-top: 20px;
            cursor: pointer;
        }
        #status {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            z-index: 50;
            font-size: 14px;
            pointer-events: none;
        }
    </style>
    <!-- Librerías cargadas de antemano (sin escena aún) -->
    <script src="https://cdn.jsdelivr.net/npm/aframe@1.4.0/dist/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ar.js@2.2.2/aframe/build/aframe-ar.min.js"></script>
</head>
<body>
    <div id="start-overlay">
        <h2>📱 Realidad Aumentada</h2>
        <p>Necesitamos acceso a tu cámara</p>
        <button id="start-btn">🎥 Iniciar cámara</button>
    </div>
    <div id="status"></div>

    <script>
        const overlay = document.getElementById('start-overlay');
        const statusDiv = document.getElementById('status');
        const startBtn = document.getElementById('start-btn');

        function setStatus(msg) {
            statusDiv.textContent = msg;
            console.log('[AR]', msg);
        }

        startBtn.addEventListener('click', async () => {
            setStatus('⏳ Solicitando permiso de cámara...');
            try {
                // 1. Pedir permiso de cámara con un gesto de usuario (así aparece el diálogo)
                const stream = await navigator.mediaDevices.getUserMedia({
                    audio: false,
                    video: { facingMode: 'environment' }
                });
                // 2. Detenemos el stream provisional (AR.js usará el suyo)
                stream.getTracks().forEach(track => track.stop());
                setStatus('✅ Permiso concedido. Iniciando RA...');

                // 3. Ocultamos overlay
                overlay.style.display = 'none';

                // 4. Creamos la escena completa (AR.js pedirá cámara automáticamente y ya tendrá permiso)
                const scene = document.createElement('a-scene');
                scene.setAttribute('embedded', '');
                scene.setAttribute('vr-mode-ui', 'enabled: false');
                scene.setAttribute('arjs', 'sourceType: webcam; trackingMethod: best; debugUIEnabled: false;');
                scene.setAttribute('renderer', 'logarithmicDepthBuffer: true;');

                // Marcador Hiro con video
                const marker = document.createElement('a-marker');
                marker.setAttribute('preset', 'hiro');
                marker.setAttribute('id', 'marker');

                const video = document.createElement('a-video');
                video.setAttribute('src', 'https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4');
                video.setAttribute('width', '0.9');
                video.setAttribute('height', '0.5');
                video.setAttribute('position', '0 0 0.1');
                video.setAttribute('rotation', '-90 0 0');
                video.setAttribute('autoplay', '');
                video.setAttribute('loop', '');
                video.setAttribute('muted', '');
                video.setAttribute('playsinline', '');
                video.setAttribute('webkit-playsinline', '');

                marker.appendChild(video);
                scene.appendChild(marker);

                // Cámara
                const camera = document.createElement('a-entity');
                camera.setAttribute('camera', '');
                scene.appendChild(camera);

                document.body.appendChild(scene);

                // Eventos de estado del marcador
                marker.addEventListener('markerFound', () => {
                    setStatus('🎯 ¡Marcador detectado! Video en pantalla.');
                });
                marker.addEventListener('markerLost', () => {
                    setStatus('🔍 Buscando marcador...');
                });

                // Escucha eventos de AR.js
                window.addEventListener('arjs-video-loaded', () => {
                    setStatus('📷 Cámara lista. Apunta al marcador Hiro.');
                });

            } catch (err) {
                setStatus('❌ Permiso denegado o error: ' + err.message);
                // Mostrar de nuevo el botón para intentar
                overlay.style.display = 'flex';
            }
        });
    </script>
</body>
</html>
