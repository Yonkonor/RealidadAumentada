<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <title>AR con marcador personalizado</title>
    
    <!-- A-Frame 1.4.0 (estable) -->
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <!-- AR.js 3.4.5 (última estable que funciona con a-frame 1.4.0) -->
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.js"></script>

    <script>
        // Componente para controlar la reproducción del video al detectar/perder el marcador
        AFRAME.registerComponent('videohandler', {
            init: function () {
                var marker = this.el;
                this.video = document.querySelector("#vid");

                // Asegurarnos de que el video está listo para pausar/reproducir
                if (!this.video) {
                    console.error("No se encontró el elemento de video con id='vid'");
                    return;
                }

                marker.addEventListener('markerFound', function () {
                    // Reproducir con manejo de promesa para evitar errores en consola
                    var playPromise = this.video.play();
                    if (playPromise !== undefined) {
                        playPromise.catch(function(error) {
                            console.warn('No se pudo reproducir automáticamente:', error);
                        });
                    }
                }.bind(this));

                marker.addEventListener('markerLost', function () {
                    this.video.pause();
                }.bind(this));
            }
        });
    </script>

    <style>
        body {
            margin: 0;
            overflow: hidden;
        }
        /* Opcional: mensaje de ayuda mientras no se detecta el marcador */
        .ar-help {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: white;
            font-family: sans-serif;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>
    <!-- Escena AR mínima y funcional -->
    <a-scene
        vr-mode-ui="enabled: false"
        arjs="sourceType: webcam; debugUIEnabled: true;"
        renderer="antialias: true; alpha: true"
    >
        <!-- Video que se mostrará sobre el marcador -->
        <a-assets>
            <video
                id="vid"
                src="assets/asset.mp4"
                preload="auto"
                loop
                muted
                playsinline
                webkit-playsinline
                crossorigin="anonymous"
            ></video>
        </a-assets>

        <!-- Marcador personalizado -->
        <a-marker
            type="pattern"
            preset="custom"
            url="assets/marker.patt"
            videohandler
        >
            <!-- Plano de video que aparece sobre el marcador -->
            <a-video
                src="#vid"
                width="1"
                height="0.5625"
                position="0 0 0"
                rotation="-90 0 0"
            ></a-video>
        </a-marker>

        <!-- Cámara AR -->
        <a-entity camera></a-entity>
    </a-scene>

    <div class="ar-help">🖼️ Apunta la cámara al marcador para ver el video</div>
</body>
</html>
