<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>AR Screen - Video Flotante</title>
  <!-- jsQR para decodificar QR -->
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #000;
      touch-action: none;
    }

    /* Cámara de fondo (realidad aumentada) */
    .camera-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      background: #000;
    }

    #cameraView {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      min-width: 100%;
      min-height: 100%;
      width: auto;
      height: auto;
      object-fit: cover;
    }

    /* Interfaz superior */
    .ui-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      pointer-events: none;
      padding-top: 20px;
    }

    .status-card {
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(12px);
      border-radius: 50px;
      padding: 10px 20px;
      font-size: 0.9rem;
      color: #0ff;
      font-weight: 500;
      border: 1px solid rgba(0, 255, 255, 0.4);
      box-shadow: 0 0 12px rgba(0, 255, 255, 0.2);
      pointer-events: none;
      text-align: center;
    }

    .hint {
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      border-radius: 28px;
      padding: 8px 18px;
      margin-top: 12px;
      font-size: 0.75rem;
      color: #ccc;
      border-left: 3px solid cyan;
    }

    .reset-btn {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid cyan;
      color: cyan;
      padding: 12px 28px;
      border-radius: 60px;
      font-weight: bold;
      font-size: 1rem;
      cursor: pointer;
      z-index: 20;
      transition: 0.2s;
      pointer-events: auto;
      font-family: monospace;
    }

    .reset-btn:active {
      transform: translateX(-50%) scale(0.96);
      background: cyan;
      color: black;
    }

    /* PANTALLA AR: video flotante estilo holograma */
    .ar-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 15;
      display: flex;
      justify-content: center;
      align-items: center;
      visibility: hidden;
      opacity: 0;
      transition: visibility 0.2s, opacity 0.4s ease;
      backdrop-filter: blur(2px);
      pointer-events: none;
    }

    .ar-screen.active {
      visibility: visible;
      opacity: 1;
      pointer-events: auto;
    }

    /* Marco holográfico (sin controles de video visibles) */
    .hologram {
      position: relative;
      width: 85%;
      max-width: 750px;
      aspect-ratio: 16 / 9;
      background: rgba(0, 20, 30, 0.3);
      border-radius: 28px;
      padding: 8px;
      backdrop-filter: blur(4px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.5), 0 0 0 2px rgba(0, 255, 255, 0.6), 0 0 0 6px rgba(0,0,0,0.3);
      transform: perspective(1000px) rotateX(4deg) translateY(0px);
      animation: floatGlow 3s infinite alternate;
    }

    @keyframes floatGlow {
      0% {
        box-shadow: 0 20px 40px rgba(0,0,0,0.5), 0 0 0 2px rgba(0, 255, 255, 0.4), 0 0 0 6px rgba(0,0,0,0.3);
        transform: perspective(1000px) rotateX(3deg) translateY(0px);
      }
      100% {
        box-shadow: 0 30px 50px rgba(0,0,0,0.6), 0 0 0 3px rgba(0, 230, 250, 0.9), 0 0 0 10px rgba(0,0,0,0.2);
        transform: perspective(1000px) rotateX(5deg) translateY(-6px);
      }
    }

    /* Video AR: sin controles, se reproduce automáticamente en bucle */
    .ar-video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 22px;
      display: block;
      background: #000;
      cursor: pointer;
      /* Sin controles nativos, solo el contenido */
    }

    /* Esquinas decorativas AR */
    .ar-corner {
      position: absolute;
      width: 28px;
      height: 28px;
      border: 2px solid cyan;
      filter: drop-shadow(0 0 5px cyan);
    }
    .corner-tl { top: 0; left: 0; border-right: none; border-bottom: none; border-radius: 8px 0 0 0; }
    .corner-tr { top: 0; right: 0; border-left: none; border-bottom: none; border-radius: 0 8px 0 0; }
    .corner-bl { bottom: 0; left: 0; border-right: none; border-top: none; border-radius: 0 0 0 8px; }
    .corner-br { bottom: 0; right: 0; border-left: none; border-top: none; border-radius: 0 0 8px 0; }

    .ar-label {
      position: absolute;
      bottom: -30px;
      left: 20px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      padding: 4px 14px;
      border-radius: 30px;
      font-size: 0.7rem;
      color: cyan;
      font-family: monospace;
      letter-spacing: 1px;
    }

    /* Widget QR de demo (solo ayuda) */
    .demo-qr {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(12px);
      border-radius: 18px;
      padding: 8px;
      z-index: 20;
      text-align: center;
      pointer-events: auto;
      border: 1px solid rgba(255,255,255,0.2);
    }
    .demo-qr span {
      font-size: 9px;
      color: #aaa;
    }
    .demo-qr img {
      width: 60px;
      height: 60px;
      border-radius: 12px;
      background: white;
    }

    @media (max-width: 600px) {
      .hologram { width: 90%; }
      .reset-btn { padding: 10px 20px; font-size: 0.8rem; bottom: 20px; }
    }
  </style>
</head>
<body>

  <div class="camera-container">
    <video id="cameraView" autoplay playsinline muted></video>
  </div>
  <canvas id="qrCanvas" style="display: none;"></canvas>

  <div class="ui-overlay">
    <div class="status-card" id="statusMsg">🔍 Escaneando QR: AR_VIDEO_TRIGGER</div>
    <div class="hint">📲 Apunta a un QR con el texto <strong style="color:#0ff;">"AR_VIDEO_TRIGGER"</strong></div>
  </div>
  <button class="reset-btn" id="resetBtn">⟳ REINICIAR AR</button>

  <!-- Pantalla de Realidad Aumentada (video flotante sin controles) -->
  <div id="arScreen" class="ar-screen">
    <div class="hologram">
      <div class="ar-corner corner-tl"></div>
      <div class="ar-corner corner-tr"></div>
      <div class="ar-corner corner-bl"></div>
      <div class="ar-corner corner-br"></div>
      <div class="ar-label">⚡ HOLOGRAM SCREEN ⚡</div>
      <video id="arVideo" class="ar-video" autoplay muted loop playsinline></video>
    </div>
  </div>

  <div class="demo-qr">
    <span>🔹 QR de prueba</span>
    <img src="https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=AR_VIDEO_TRIGGER" alt="demo qr">
  </div>

  <script>
    (function() {
      // Elementos
      const cameraVideo = document.getElementById('cameraView');
      const qrCanvas = document.getElementById('qrCanvas');
      const ctx = qrCanvas.getContext('2d');
      const statusEl = document.getElementById('statusMsg');
      const resetBtn = document.getElementById('resetBtn');
      const arScreen = document.getElementById('arScreen');
      const arVideo = document.getElementById('arVideo');
      
      // Configuración
      const EXPECTED_QR = "AR_VIDEO_TRIGGER";
      const VIDEO_URL = "https://www.youtube.com/watch?v=I9rWj2blNKk"; // video demo
      
      let scanning = true;
      let videoActive = false;
      let animFrame = null;
      let mediaStream = null;
      
      function updateStatus(msg, isError = false) {
        statusEl.innerHTML = msg;
        statusEl.style.color = isError ? "#ffaa88" : "#0ff";
      }
      
      // Mostrar pantalla AR con video flotante
      function showARScreen() {
        if (videoActive) return;
        videoActive = true;
        scanning = false;
        
        if (animFrame) cancelAnimationFrame(animFrame);
        
        // Configurar video AR: sin controles, loop, autoplay
        arVideo.src = VIDEO_URL;
        arVideo.load();
        arVideo.muted = true;
        arVideo.loop = true;
        arVideo.controls = false;  // sin barra de controles
        arVideo.play().catch(e => console.log("Autoplay necesitó interacción", e));
        
        arScreen.classList.add('active');
        updateStatus("✨ REALIDAD AUMENTADA ACTIVADA ✨ Video holográfico");
      }
      
      // Reiniciar toda la experiencia
      function resetAR() {
        if (!videoActive && scanning) return; // ya en escaneo
        arScreen.classList.remove('active');
        arVideo.pause();
        arVideo.src = "";
        arVideo.load();
        videoActive = false;
        scanning = true;
        
        if (animFrame) cancelAnimationFrame(animFrame);
        if (mediaStream && mediaStream.active) {
          startScanLoop();
        } else {
          initCamera().then(startScanLoop).catch(e => updateStatus("Error cámara: " + e.message, true));
        }
        updateStatus("🔁 Escaneo reiniciado. Busca QR: AR_VIDEO_TRIGGER");
      }
      
      // Escaneo de QR desde el frame de cámara
      async function scanQR() {
        if (!scanning) return;
        if (!cameraVideo.videoWidth || cameraVideo.readyState < 2) return;
        
        const width = cameraVideo.videoWidth;
        const height = cameraVideo.videoHeight;
        let scanW = 480;
        let scanH = Math.floor((height * scanW) / width);
        if (scanH < 200) scanH = 300;
        qrCanvas.width = scanW;
        qrCanvas.height = scanH;
        
        ctx.drawImage(cameraVideo, 0, 0, width, height, 0, 0, scanW, scanH);
        const imgData = ctx.getImageData(0, 0, scanW, scanH);
        const code = jsQR(imgData.data, imgData.width, imgData.height, { inversionAttempts: "dontInvert" });
        
        if (code && code.data === EXPECTED_QR && !videoActive) {
          updateStatus("✅ QR válido. Abriendo pantalla AR...");
          setTimeout(() => showARScreen(), 80);
        } else if (code && code.data !== EXPECTED_QR && code.data.length > 0) {
          updateStatus(`⚠️ QR incorrecto: "${code.data.substring(0, 20)}"`, false);
        }
      }
      
      function startScanLoop() {
        if (!scanning) return;
        const loop = () => {
          if (scanning && !videoActive) {
            scanQR();
            animFrame = requestAnimationFrame(loop);
          } else {
            animFrame = null;
          }
        };
        if (animFrame) cancelAnimationFrame(animFrame);
        animFrame = requestAnimationFrame(loop);
      }
      
      async function initCamera() {
        try {
          if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
          const constraints = { video: { facingMode: { exact: "environment" }, width: { ideal: 1280 }, height: { ideal: 720 } } };
          try {
            mediaStream = await navigator.mediaDevices.getUserMedia(constraints);
          } catch (e) {
            mediaStream = await navigator.mediaDevices.getUserMedia({ video: true });
          }
          cameraVideo.srcObject = mediaStream;
          await cameraVideo.play();
          updateStatus("📷 Cámara lista. Escanea el código QR.");
          return true;
        } catch (err) {
          let errMsg = "No se pudo acceder a la cámara. Permisos?";
          if (err.name === "NotAllowedError") errMsg = "🔒 Permiso de cámara denegado.";
          updateStatus(errMsg, true);
          return false;
        }
      }
      
      async function bootstrap() {
        const ok = await initCamera();
        if (ok) startScanLoop();
      }
      
      resetBtn.addEventListener('click', resetAR);
      window.addEventListener('load', bootstrap);
      window.addEventListener('beforeunload', () => {
        if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
        if (animFrame) cancelAnimationFrame(animFrame);
      });
    })();
  </script>
</body>
</html>
